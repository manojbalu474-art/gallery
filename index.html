<!DOCTYPE html>
<html>
<head>
    <title>Boys Vibes Photo Gallery</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: white;
            text-align: center;
        }

        h1 {
            color: #00eaff;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: #1c1c1c;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
            transition: 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.6);
        }

        .gallery-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .caption {
            padding: 12px;
            background: #111;
            color: #00eaff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>VIBES GALLERY 🔥</h1>

    <div class="gallery">
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" alt="Sports Car">
            <div class="caption">Beast Mode Car</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="Coding Setup">
            <div class="caption">Gaming Zone</div>
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7" alt="Gaming Setup">
            <div class="caption">Midnight Hustle</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49" alt="Luxury Watch">
            <div class="caption">Luxury Style</div>
        </div>
    </div>

</body> 
</html>
